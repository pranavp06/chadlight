<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed — Chad Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: #ffe135;
      letter-spacing: 0.04em;
      margin: 0 0 12px;
    }
    p { color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: #ffe135;
      color: #000;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 28px;
      border-radius: 999px;
      text-decoration: none;
    }
    a:hover { background: #e6c200; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h1>You're a Chad.</h1>
    <p>Order confirmed. Your Chad Light is on its way. Time to mog the entire gym.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
